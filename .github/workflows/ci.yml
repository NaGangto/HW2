name: CI/CD Pipeline - Docker Build & Push

on:
  push:
    branches: [ "main" ]  # main 브랜치에 코드가 푸시되면 트리거
  pull_request:
    branches: [ "main" ]  # main 브랜치를 대상으로 하는 PR 생성 시 트리거 (빌드 테스트)

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 저장소 코드 체크아웃
      - name: Check out the repo
        uses: actions/checkout@v4

      # 2. 최신 Docker 빌드 엔진(Buildx) 세팅 (캐시 등 유용한 기능 제공)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Docker Hub 로그인 (GitHub Repositories -> Settings -> Secrets에 설정된 값 사용)
      # 필요한 Secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN
      - name: Log in to Docker Hub
        # PR(Pull Request)이 아닐 때만 로그인 수행
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. Docker 이미지 빌드 및 Push
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          # PR이면 빌드 테스트만 하고 Push는 하지 않음, main 머지/푸시일 때만 Push 수행
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sentiment-api:latest
          
          # [최적화] GitHub Actions 내부 캐싱 사용을 통해 다음 워크플로우 실행 시간 대폭 단축
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    # main 브랜치 푸시일 때만 배포 실행 (PR 제외)
    if: github.event_name != 'pull_request'
    # 로컬에 등록한 Self-hosted Runner 위에서 실행
    runs-on: self-hosted
    
    steps:
      - name: Pull latest Docker image
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/sentiment-api:latest

      - name: Stop existing container
        continue-on-error: true
        run: docker stop sentiment-api

      - name: Remove existing container
        continue-on-error: true
        run: docker rm sentiment-api

      - name: Run new container
        run: docker run -d -p 8000:8000 --name sentiment-api ${{ secrets.DOCKERHUB_USERNAME }}/sentiment-api:latest

